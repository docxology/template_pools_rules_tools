# manuscript/config.yaml
# Pools, Rules, and Tools: A Template-Integrated Resource Architecture
# Live configuration for the template_pools_rules_tools exemplar.

paper:
  title: "Pools, Rules, and Tools: A Template-Integrated Resource Architecture"
  subtitle: "A Meta-Project Demonstrating Fonds, Rules, and Tools Integration in Research Software"
  short_title: "Pools, Rules, and Tools"
  version: "1.0.0"
  date: "2026-07-10"
  keywords:
    - research software engineering
    - monorepo architecture
    - reproducibility
    - fonds
    - governance rules
    - tool discovery
    - graceful degradation
  cover:
    image: "figures/cover_art.png"

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  doi: "10.5281/zenodo.21298888"
  doi_status: "reserved (draft deposition; awaiting first publication)"
  version_doi: "10.5281/zenodo.21298889"
  github_repository: "docxology/template"
  license: "CC-BY-4.0"
  venue: "Journal of Open Source Software"
  status: "preprint"
  preprint_server: "arXiv"
  preprint_id: "2026.00000"
  version_record: "https://zenodo.org/records/21298889"

# Strong-rule semantic validation context (see scripts/04_validate_strong_rules.py)
strong_rules:
  canonical_sections:
    - Abstract
    - Introduction
    - Related Work
    - Methods
    - Results
    - Discussion
    - Conclusion
    - References
  coverage:
    infrastructure: 60
    project_src: 90
    public_api: 95

# Manuscript section toggles
sections:
  frontmatter: true
  abstract: true
  introduction: true
  pools: true
  rules: true
  tools: true
  integration: true
  conclusion: true

# Integration demo parameters
integration:
  rule_sets:
    - template_project_rules
    - template_manuscript_rules
  tools:
    - template_code_executor
    - template_validator
    - template_skill
  fonds:
    - template_bibliography
    - template_contacts
    - template_datasets

# Figure registry — paths relative to manuscript/
figures:
  architecture_overview:
    path: "figures/architecture_overview.png"
    caption: "Three-layer resource architecture of template_pools_rules_tools. Fonds (left) provide read-only data pools; Rules (centre) provide governance constraints; Tools (right) provide executable entry points. The Integration layer (bottom) orchestrates all three."
    label: "fig:architecture"
    width: "0.9\\linewidth"
  resource_counts:
    path: "figures/resource_counts.png"
    caption: "Runtime integration counts from manuscript_variables.json. Bars show fonds loaded, rule sets validated, and tools discovered during a single pipeline run."
    label: "fig:counts"
    width: "0.75\\linewidth"
  status_dashboard:
    path: "figures/status_dashboard.png"
    caption: "Integration status dashboard showing per-resource validation results. Green indicates ok, amber indicates partial, red indicates missing."
    label: "fig:pipeline"
    width: "0.85\\linewidth"
  fond_taxonomy:
    path: "figures/fond_taxonomy.png"
    caption: "Schema taxonomy comparison across the three fond types. Each fond declares a manifest and a `type` field; source-of-truth format, secondary mirror, and dedup key differ by category."
    label: "fig:taxonomy"
    width: "0.85\\linewidth"
  rule_hierarchy:
    path: "figures/rule_hierarchy.png"
    caption: "Rule hierarchy: the two template rule sets, each split into a machine-enforceable `strong/` branch and a guidance-only `soft/` branch."
    label: "fig:rulehier"
    width: "0.85\\linewidth"
  tool_contract:
    path: "figures/tool_contract.png"
    caption: "Invocation contract for the three template tools: stdin payload, tool behaviour, and stdout/exit-code shape."
    label: "fig:toolcontract"
    width: "0.9\\linewidth"
  resilience_layers:
    path: "figures/resilience_layers.png"
    caption: "The integration layer's three-level resilience design: resource absence, schema malformation, and script absence, each with its own graceful-degradation response."
    label: "fig:resilience"
    width: "0.85\\linewidth"
  pipeline_flow:
    path: "figures/pipeline_flow.png"
    caption: "The six-script pipeline from source validation through token hydration, ending at the combined-PDF render step."
    label: "fig:pipelineflow"
    width: "0.95\\linewidth"

# Manuscript variable token paths
manuscript_variables_path: "output/data/manuscript_variables.json"

# Rendering options
render:
  engine: "pandoc"
  bibliography_style: "chicago-author-date"
  link_citations: true
  number_sections: true
  toc: true
  toc_depth: 3
  highlight_style: "tango"

# Typography overrides (single source of truth for page margins — see
# preamble.md header comment; do not also declare \geometry{} in the
# preamble, or the two declarations conflict).
metadata:
  geometry: "a4paper,margin=1.6cm,top=1.8cm,bottom=1.8cm"
